name: Fix Post Date

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
      content_dir:
        required: false
        type: string
        default: ''
      exclude_dirs:
        required: false
        type: string
        default: ''
        description: '날짜 보정에서 제외할 디렉토리 (쉼표 구분, 예: contents/biweekly,contents/archive)'

jobs:
  fix-post-date:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check and fix dates
        id: fix-dates
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = ${{ inputs.pr_number }};
            const today = new Date().toISOString().split('T')[0];

            // merge된 PR에서 변경된 파일 목록 조회
            const { data: files } = await github.rest.pulls.listFiles({
              owner, repo,
              pull_number: prNumber
            });

            // index.md 파일만 필터링 (content_dir이 지정되면 해당 경로만 대상)
            const contentDir = '${{ inputs.content_dir }}';
            const excludeDirs = '${{ inputs.exclude_dirs }}'.split(',').map(d => d.trim()).filter(Boolean);
            const indexFiles = files.filter(f => {
              if (!f.filename.endsWith('index.md')) return false;
              if (contentDir && !f.filename.startsWith(contentDir + '/')) return false;
              if (excludeDirs.some(dir => f.filename.startsWith(dir + '/'))) return false;
              return true;
            });

            if (indexFiles.length === 0) {
              console.log('index.md 파일이 없습니다. 종료합니다.');
              return;
            }

            const filesToFix = [];

            for (const file of indexFiles) {
              try {
                const { data: content } = await github.rest.repos.getContent({
                  owner, repo,
                  path: file.filename
                });

                const fileContent = Buffer.from(content.content, 'base64').toString('utf-8');
                const dateMatch = fileContent.match(/^---[\s\S]*?date:\s*(\d{4}-\d{2}-\d{2})[\s\S]*?---/);

                if (dateMatch && dateMatch[1] > today) {
                  console.log(`미래 날짜 감지: ${file.filename} (date: ${dateMatch[1]})`);
                  filesToFix.push({ path: file.filename, oldDate: dateMatch[1] });
                } else if (dateMatch && dateMatch[1] < today) {
                  console.log(`과거 날짜 (의도된 것으로 간주, 스킵): ${file.filename} (date: ${dateMatch[1]})`);
                } else {
                  console.log(`정상: ${file.filename} (date: ${dateMatch ? dateMatch[1] : 'N/A'})`);
                }
              } catch (error) {
                console.log(`파싱 실패 (스킵): ${file.filename} - ${error.message}`);
              }
            }

            if (filesToFix.length === 0) {
              console.log('보정할 파일이 없습니다. 종료합니다.');
              return;
            }

            core.setOutput('files_to_fix', JSON.stringify(filesToFix));
            core.setOutput('today', today);
            core.setOutput('pr_number', prNumber);

      - name: Fix dates and create PR
        if: steps.fix-dates.outputs.files_to_fix != ''
        uses: actions/github-script@v7
        env:
          FILES_TO_FIX: ${{ steps.fix-dates.outputs.files_to_fix }}
          TODAY: ${{ steps.fix-dates.outputs.today }}
          PR_NUMBER: ${{ steps.fix-dates.outputs.pr_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const filesToFix = JSON.parse(process.env.FILES_TO_FIX);
            const today = process.env.TODAY;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const branchName = `chore/fix-post-date-${prNumber}`;

            // main 브랜치의 최신 SHA 조회
            const { data: ref } = await github.rest.git.getRef({
              owner, repo,
              ref: 'heads/main'
            });

            // 보정 브랜치 생성 (재실행 시 기존 브랜치 삭제 후 재생성)
            try {
              await github.rest.git.createRef({
                owner, repo,
                ref: `refs/heads/${branchName}`,
                sha: ref.object.sha
              });
            } catch (error) {
              if (error.status === 422) {
                console.log(`브랜치 ${branchName} 이미 존재. 삭제 후 재생성합니다.`);
                await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branchName}` });
                await github.rest.git.createRef({
                  owner, repo,
                  ref: `refs/heads/${branchName}`,
                  sha: ref.object.sha
                });
              } else {
                throw error;
              }
            }

            const changedFiles = [];

            for (const file of filesToFix) {
              // 파일 내용 조회
              const { data: content } = await github.rest.repos.getContent({
                owner, repo,
                path: file.path,
                ref: branchName
              });

              let fileContent = Buffer.from(content.content, 'base64').toString('utf-8');

              // date 필드 치환
              fileContent = fileContent.replace(
                new RegExp(`^(date:\\s*)${file.oldDate}`, 'm'),
                `$1${today}`
              );
              // update 필드는 값과 무관하게 오늘 날짜로 보정
              fileContent = fileContent.replace(
                /^(update:\s*)\d{4}-\d{2}-\d{2}/m,
                `$1${today}`
              );

              // 파일 업데이트
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo,
                path: file.path,
                message: `[chore] 포스팅 날짜를 현재 날짜로 보정 (${file.path})`,
                content: Buffer.from(fileContent).toString('base64'),
                branch: branchName,
                sha: content.sha
              });

              changedFiles.push(`- \`${file.path}\`: ${file.oldDate} → ${today}`);
              console.log(`보정 완료: ${file.path} (${file.oldDate} → ${today})`);
            }

            // PR 생성
            const { data: pr } = await github.rest.pulls.create({
              owner, repo,
              title: '[chore] 포스팅 날짜를 현재 날짜로 보정',
              head: branchName,
              base: 'main',
              body: `PR #${prNumber} merge 시 미래 날짜가 감지되어 오늘 날짜로 자동 보정합니다.\n\n### 변경 파일\n${changedFiles.join('\n')}`
            });

            console.log(`PR 생성 완료: #${pr.number} (${pr.html_url})`);
